name: Build Android APK

on:
  push:
    branches: [ "main", "master", "dev", "test" ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Install QR Code Tool
        run: sudo apt-get install -y qrencode

      - name: List files (Debug)
        run: ls -R

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Set Release Tag
        run: |
          # Get current date and time
          TIMESTAMP=$(date +'%Y-%m-%d-%H%M')
          
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "TAG_NAME=nightly-$(date +'%Y-%m-%d')" >> $GITHUB_ENV
            echo "RELEASE_NAME=Nightly Build $(date +'%Y-%m-%d')" >> $GITHUB_ENV
          else
            # Use branch name + timestamp for unique releases
            BRANCH_NAME=${{ github.ref_name }}
            echo "TAG_NAME=${BRANCH_NAME}-${TIMESTAMP}" >> $GITHUB_ENV
            echo "RELEASE_NAME=${BRANCH_NAME} Build (${TIMESTAMP})" >> $GITHUB_ENV
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          files: build/app/outputs/flutter-apk/app-release.apk
          prerelease: true
          overwrite: true

      - name: Generate QR Code
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/${{ env.TAG_NAME }}/app-release.apk"
          echo "Scan this QR code to download the APK:"
          echo "URL: $URL"
          qrencode -t ANSIUTF8 "$URL"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk