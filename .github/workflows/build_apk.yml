name: Build Android APK

on:
  push:
    branches: [ "main", "master", "dev", "test" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Install QR Code Tool
        run: sudo apt-get install -y qrencode

      - name: List files (Debug)
        run: ls -R

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Set Release Tag
        run: echo "TAG_NAME=nightly-${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Nightly Build (${{ github.ref_name }})
          tag_name: ${{ env.TAG_NAME }}
          files: build/app/outputs/flutter-apk/app-release.apk
          prerelease: true
          overwrite: true

      - name: Generate QR Code
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/${{ env.TAG_NAME }}/app-release.apk"
          echo "Scan this QR code to download the APK:"
          echo "URL: $URL"
          qrencode -t ANSIUTF8 "$URL"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk